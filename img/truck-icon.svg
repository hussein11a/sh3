  <rect x="50" y="30" width="60" height="20" rx="3" fill="#4285F4"/>
  <rect x="55" y="25" width="50" height="8" rx="2" fill="#87CEEB"/>
  <circle cx="60" cy="52" r="4" fill="#333"/>
  <circle cx="100" cy="52" r="4" fill="#333"/>
  
  <!-- تفاصيل إضافية -->
  <rect x="25" y="65" width="8" height="8" fill="#FFD700"/>
  <rect x="127" y="65" width="8" height="8" fill="#FFD700"/>
  
  <!-- أضواء -->
  <circle cx="175" cy="75" r="3" fill="#FFFF00"/>
  <circle cx="175" cy="85" r="3" fill="#FF0000"/>
</svg>

